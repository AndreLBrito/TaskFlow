<div class="table-container">
  <table mat-table [dataSource]="workspaces()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let workspace" class="workspace-name">
        {{ workspace.name }}
      </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Descrição</th>
      <td mat-cell *matCellDef="let workspace">
        <span [class.no-description]="!workspace.description?.trim()">
          {{ workspace.description?.trim() || 'Sem descrição' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Criado em</th>
      <td mat-cell *matCellDef="let workspace">
        {{ workspace.createdAt | date: 'dd/MM/yyyy, HH:mm' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="actions-column">Ações</th>
      <td mat-cell *matCellDef="let workspace" class="actions-column">
        <button
          mat-icon-button
          type="button"
          aria-label="Editar workspace"
          matTooltip="Editar workspace"
          (click)="editWorkspace.emit(workspace)"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-icon-button
          type="button"
          aria-label="Excluir workspace"
          matTooltip="Excluir workspace"
          (click)="deleteWorkspace.emit(workspace)"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
