services:
  taskflow-db:
    image: postgres:17
    container_name: taskflow-db
    restart: always

    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: taskflow_password

    ports:
      - "5432:5432"

    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data

volumes:
  taskflow_postgres_data: